<script>
// ============================================================
// LOGIKA PERHITUNGAN SANTUNAN YASSA (MODULAR)
// ============================================================
const hitungTotalSantunanGopay = (anakList, baseNom, bonusNom) => {
    const base = parseInt(baseNom || 0);
    const bonus = parseInt(bonusNom || 0);
    
    if (base === 0 || !anakList || anakList.length === 0) return 0;

    let totalYP = 0;
    let totalDsb = 0;

    anakList.forEach(c => {
        const yp = String(getVal(c, 'YATIM PIATU') || '').toUpperCase();
        const dsb = String(getVal(c, 'DISABILITAS') || '').toUpperCase();

        if (yp.includes('PIATU') || yp === 'YA') totalYP++;
        if (dsb.includes('DISABILITAS') || dsb === 'YA') totalDsb++;
    });

    return (anakList.length * base) + ((totalYP + totalDsb) * bonus);
};

// Fungsi pembersih ID Keluarga
const normId = (id) => String(id || "").toUpperCase().replace(/[^A-Z0-9]/g, "").trim();

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // ============================================================
        // 🚀 VERSI APLIKASI (UBAH ANGKA INI SETIAP KALI ADA UPDATE KODE)
        // ============================================================
        const APP_VERSION = "1.1.38-PERISAI-SECURITY";

        // ============================================================
        // ⚠️ SANGAT PENTING: GANTI TEKS DI BAWAH DENGAN URL WEB APP ANDA
        // ============================================================
        // ============================================================
        // 🔒 KONFIGURASI GAS URL (Jangan dibagikan ke publik)
        // ============================================================
        let URL_DATABASE_PERMANEN = "https://script.google.com/macros/s/AKfycbymw1J86iH_QQeD1Ee5X_q4mxMJX5dagD3FyZr8DfE1eCZ0oz5Aah2LnU94cBqlKchx/exec";

        // ============================================================
        // 🔒 SESSION HELPER — localStorage + expiry 8 jam
        // ============================================================
        const SESSION_EXPIRY_MS = 8 * 60 * 60 * 1000; // 8 jam
        const yassaStore = {
            set: (key, value) => {
                localStorage.setItem(key, value);
                localStorage.setItem(key + '_exp', Date.now() + SESSION_EXPIRY_MS);
            },
            get: (key) => {
                const exp = parseInt(localStorage.getItem(key + '_exp') || '0');
                if (Date.now() > exp) {
                    localStorage.removeItem(key);
                    localStorage.removeItem(key + '_exp');
                    return null;
                }
                return localStorage.getItem(key);
            },
            remove: (key) => {
                localStorage.removeItem(key);
                localStorage.removeItem(key + '_exp');
            },
            clear: () => {
                const keys = ['yassa-role','yassa-wilayah','yassa-username','yassa-fullname','yassa-foto','yassa-token','yassa-active-user','yassa-force-pwd'];
                keys.forEach(k => { localStorage.removeItem(k); localStorage.removeItem(k + '_exp'); });
            }
        }; 
        
        // GitHub Pages: URL GAS sudah dikonfigurasi di atas

        const getVal = (obj, key) => {
            if (!obj) return "";
            const foundKey = Object.keys(obj).find(k => k.trim().toUpperCase() === key.toUpperCase());
            return foundKey ? String(obj[foundKey] || "") : "";
        };

        // ============================================================
        // 🔒 FUNGSI INTI: SEMUA API CALL PAKAI POST (Token tidak di URL)
        // ============================================================
        const postApi = async (params) => {
            try {
                const res = await fetch(URL_DATABASE_PERMANEN, {
                    method: 'POST',
                    // PERBAIKAN: Gunakan text/plain untuk mencegah pemblokiran CORS dari Google
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(params)
                });
                return await res.json();
            } catch (error) {
                return { success: false, error: "Koneksi terblokir oleh Google atau jaringan terputus." };
            }
        };

        // KOMPONEN MULTI SELECT (Untuk filter bisa lebih dari 1) (Gaya Neumorphism)
            const MultiSelectFilter = ({ label, options, selectedVals, onChange, theme = 'slate' }) => {
                const [isOpen, setIsOpen] = useState(false);
                const dropdownRef = useRef(null);

                useEffect(() => {
                    const handleClickOutside = (event) => {
                        if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                            setIsOpen(false);
                        }
                    };
                    document.addEventListener("mousedown", handleClickOutside);
                    return () => document.removeEventListener("mousedown", handleClickOutside);
                }, []);
                
                const toggleVal = (val) => {
                    if (selectedVals.includes(val)) onChange(selectedVals.filter(v => v !== val));
                    else onChange([...selectedVals, val]);
                };

                // Penyederhanaan warna tulisan agar serasi dengan Neumorphism
                const themes = {
                    slate: { text: 'text-slate-600', checkbox: 'text-slate-600 focus:ring-slate-500' },
                    amber: { text: 'text-amber-600', checkbox: 'text-amber-600 focus:ring-amber-500' },
                    rose: { text: 'text-rose-600', checkbox: 'text-rose-600 focus:ring-rose-500' },
                };
                const t = themes[theme] || themes.slate;

                return (
                    <div className="relative flex-1 min-w-[120px]" ref={dropdownRef}>
                        <div onClick={() => setIsOpen(!isOpen)} className={`bg-[#E0E5EC] border-none px-4 py-3.5 rounded-2xl text-[10px] sm:text-xs font-black outline-none cursor-pointer flex justify-between items-center transition-all ${isOpen ? 'shadow-[inset_4px_4px_8px_rgb(163,177,198,0.6),inset_-4px_-4px_8px_rgba(255,255,255,0.8)]' : 'shadow-[6px_6px_12px_rgb(163,177,198,0.6),-6px_-6px_12px_rgba(255,255,255,0.8)]'} ${t.text} truncate`}>
                            <span className="truncate">{selectedVals.length > 0 ? `${label} (${selectedVals.length})` : label}</span>
                            <span className="text-[10px] ml-2 opacity-60">{isOpen ? '▲' : '▼'}</span>
                        </div>
                        {isOpen && (
                            <div className="absolute z-[100] top-full mt-3 left-0 w-full min-w-[160px] bg-[#E0E5EC] border-none shadow-[9px_9px_16px_rgb(163,177,198,0.6),-9px_-9px_16px_rgba(255,255,255,0.5)] rounded-2xl max-h-60 overflow-y-auto p-2 flex flex-col gap-1">
                                {options.length === 0 && <div className="text-[10px] p-3 text-slate-400 text-center italic font-bold">Tidak ada opsi</div>}
                                {options.map(opt => (
                                    <label key={opt} className="flex items-center gap-3 p-3 hover:bg-[#d1d9e6] rounded-xl cursor-pointer text-[10px] sm:text-[11px] text-slate-700 font-bold break-words transition-colors">
                                        <input type="checkbox" checked={selectedVals.includes(opt)} onChange={() => toggleVal(opt)} className={`rounded ${t.checkbox} w-4 h-4 cursor-pointer`} />
                                        {opt}
                                    </label>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

        const SearchableBankSelect = ({ value, onChange, disabled, options }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState(value || '');
            const wrapperRef = useRef(null);

            useEffect(() => {
                setSearch(value || '');
            }, [value]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const filteredOptions = useMemo(() => {
                if (!search) return options;
                const s = search.toLowerCase();
                return options.filter(o => o.toLowerCase().includes(s));
            }, [search, options]);

            return (
                <div className="relative w-full" ref={wrapperRef}>
                    <div className="relative">
                        <input
                            type="text"
                            value={search}
                            disabled={disabled}
                            onChange={(e) => {
                                const val = e.target.value.toUpperCase();
                                setSearch(val);
                                onChange(val);
                                setIsOpen(true);
                            }}
                            onFocus={() => setIsOpen(true)}
                            placeholder="Ketik atau pilih bank..."
                            className="w-full bg-slate-50 border border-slate-200 px-4 py-3.5 rounded-xl text-xs font-bold text-slate-700 outline-none focus:bg-white focus:border-green-400 focus:ring-2 focus:ring-green-50 shadow-sm transition-all disabled:opacity-50 pr-10"
                        />
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-[10px]">
                            {isOpen ? '▲' : '▼'}

const dashboardStats = useMemo(() => {
    const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
    const currentYear = new Date().getFullYear(); // 2026
    const currentMonthStr = new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }).toUpperCase();
    
    let totalMasuk = 0;
    let totalKeluar = 0;
    let currentMonthMasuk = 0;
    let currentMonthKeluar = 0;

    const monthlyData = months.map((m, index) => {
        const monthStr = `${m} ${currentYear}`; // Contoh: "JANUARI 2026"
        const monthNum = String(index + 1).padStart(2, '0');
        const monthHtmlFormat = `${currentYear}-${monthNum}`; // Contoh: "2026-01"
        
        const masuk = data.anak.filter(c => {
            // HANYA CEK KOLOM INI, BUKAN SELURUH DATA ANAK
            const aktif = String(c['AKTIF SANTUNAN GOPAY'] || '').toUpperCase();
            if (!aktif) return false;
            
            // Harus benar-benar mengandung kata "JANUARI 2026" atau "2026-01" di kolom AKTIF SANTUNAN GOPAY
            return aktif.includes(monthStr) || aktif.includes(monthHtmlFormat);
        }).length;

        const keluar = (data.arsipAnak || []).filter(c => {
            // HANYA CEK KOLOM INI
            const tglKeluar = String(c['TANGGAL KELUAR'] || '').toUpperCase();
            if (!tglKeluar) return false;

            // Harus benar-benar mengandung "JANUARI 2026" atau "2026-01" di kolom TANGGAL KELUAR
            return tglKeluar.includes(monthStr) || tglKeluar.includes(monthHtmlFormat);
        }).length;

        totalMasuk += masuk;
        totalKeluar += keluar;
        
        if (monthStr === currentMonthStr) {
            currentMonthMasuk = masuk;
            currentMonthKeluar = keluar;
        }

        return { month: m.substring(0,3), masuk, keluar, fullStr: monthStr };
    });

    return { monthlyData, totalMasuk, totalKeluar, currentYear, currentMonthStr, currentMonthMasuk, currentMonthKeluar };

                if (daftarHitam.includes(newPwd.toLowerCase())) {
                    setPwdMsg('⚠️ DITOLAK: Password terlalu gampang ditebak (seperti 123456). Gunakan kombinasi lain!');
                    return;

                    return;

                        }

                    } else { 
                        const errorMessage = (loginRes && loginRes.error) ? loginRes.error : 'Nomor HP atau Password Salah!';
                        setLoginError(errorMessage);
                        sendLog(cleanUsername, 'Gagal', 'Unknown', 'Akses Ditolak');
                    }
                } catch (e) {
                    setLoginError('Gagal memverifikasi akun. Cek koneksi.');
                }
                setLoading(false);
            };

            const handleUploadImage = async (e, childIdx) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.size > 5 * 1024 * 1024) {
                    setMsg("⚠️ Ukuran foto terlalu besar! Maksimal 5MB.");
                    setTimeout(() => setMsg(""), 4000);
                    return;
                }

                setUploadingImageIdx(childIdx);
                
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    try {
                        const base64Image = reader.result.split(',')[1];
                        
                        const payload = {
                            action: 'uploadImage',
                            base64: base64Image,
                            mimeType: file.type,
                            fileName: `YASSA_FOTO_${Date.now()}_${file.name}`,
                            token: yassaStore.get('yassa-token') || ''
                        };

                        const res = await fetch(URL_DATABASE_PERMANEN, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        }).then(r => r.json());

                        if (res.success) {
                            const imageUrl = res.url;
                            const nk = [...regChildren];
                            if(!nk[childIdx]) nk[childIdx] = {};
                            nk[childIdx]['FOTO ANAK'] = imageUrl;
                            setRegChildren(nk);
                            setMsg("✅ Foto berhasil disimpan ke Google Drive!");
                        } else {
                            setMsg(`❌ Gagal Simpan di Drive: ${res.error || 'Server Error'}`);
                        }
                    } catch (err) {
                        setMsg("❌ Error jaringan saat upload foto.");
                    }
                    setUploadingImageIdx(null);
                    setTimeout(() => setMsg(""), 5000);
                };
            };


            const analytics = useMemo(() => {
                const gopayKKSet = new Set();
                const sapaKKSet = new Set();
                let gStats = { yt: 0, yp: 0, dsbAnak: 0, dsbIbu: 0 };
                let sStats = { yt: 0, yp: 0, dsbAnak: 0, dsbIbu: 0 };

                data.anak.forEach(c => {
                    const famIdNorm = norm(getVal(c, 'ID_Keluarga'));
                    const prog = (getVal(c, 'PROGRAM') || '').toLowerCase();
                    const isSapa = prog.includes('sapa') || prog.includes('asuh') || prog.includes('ota');
                    const isGopay = prog.includes('gopay');
                    const isYT = String(getVal(c, 'YATIM')).toLowerCase() === 'ya' || getVal(c, 'YATIM').toLowerCase().includes('yatim');
                    const isYP = String(getVal(c, 'YATIM PIATU')).toLowerCase() === 'ya' || getVal(c, 'YATIM PIATU').toLowerCase().includes('piatu');
                    const isChildDsb = String(getVal(c, 'DISABILITAS')).toLowerCase() === 'ya' || getVal(c, 'DISABILITAS').toLowerCase().includes('disabilitas');

                    if (isGopay) {
                        gopayKKSet.add(famIdNorm);
                        if(isYT) gStats.yt++;
                        if(isYP) gStats.yp++;
                        if(isChildDsb) gStats.dsbAnak++;
                    } else if (isSapa) {
                        sapaKKSet.add(famIdNorm);
                        if(isYT) sStats.yt++;
                        if(isYP) sStats.yp++;
                        if(isChildDsb) sStats.dsbAnak++;
                    }
                });

                gopayKKSet.forEach(id => {
                    const f = familyLookupMap[id];
                    if (f && String(getVal(f, 'KATAGORI ISTRI')).toLowerCase().includes('disabilitas')) gStats.dsbIbu++;
                });
                sapaKKSet.forEach(id => {
                    const f = familyLookupMap[id];
                    if (f && String(getVal(f, 'KATAGORI ISTRI')).toLowerCase().includes('disabilitas')) sStats.dsbIbu++;
                });

                return { 
                    gopayAnak: data.anak.filter(c => getVal(c, 'PROGRAM').toLowerCase().includes('gopay')).length, 
                    gopayKK: gopayKKSet.size, gStats, 
                    sapaAnak: data.anak.filter(c => { const p = getVal(c, 'PROGRAM').toLowerCase(); return p.includes('sapa') || p.includes('asuh') || p.includes('ota'); }).length, 
                    sapaKK: sapaKKSet.size, sStats 
                };
            }, [data, familyLookupMap]);

            const regionalData = useMemo(() => {
                const map = {};
                const activeKkSet = {}; 

                if (!regionAnalysisFilter) {
                    data.keluarga.forEach(f => {
                        const w = (getVal(f, 'WILAYAH') || 'Lainnya').trim().toUpperCase();
                        if(!map[w]) map[w] = { kk: 0, yt: 0, yp: 0, dsb: 0 };
                        map[w].kk++;
                    });
                }

                data.anak.forEach(c => {
                    const prog = (getVal(c, 'PROGRAM') || '').toLowerCase();
                    const isSapa = prog.includes('sapa') || prog.includes('asuh') || prog.includes('ota');
                    const isGopay = prog.includes('gopay');
                    let matchFilter = false;

                    if (!regionAnalysisFilter) matchFilter = true;
                    else if (regionAnalysisFilter === 'Gopay' && isGopay) matchFilter = true;
                    else if (regionAnalysisFilter === 'SAPA' && isSapa) matchFilter = true;

                    if (!matchFilter) return;

                    const famIdNorm = norm(getVal(c, 'ID_Keluarga'));
                    const fam = familyLookupMap[famIdNorm];
                    const w = fam ? (getVal(fam, 'WILAYAH') || 'Lainnya').trim().toUpperCase() : 'Lainnya';

                    if (!map[w]) map[w] = { kk: 0, yt: 0, yp: 0, dsb: 0 };
                    if (!activeKkSet[w]) activeKkSet[w] = new Set();
                    activeKkSet[w].add(famIdNorm);

                    const isYT = String(getVal(c, 'YATIM')).toLowerCase() === 'ya' || getVal(c, 'YATIM').toLowerCase().includes('yatim');
                    const isYP = String(getVal(c, 'YATIM PIATU')).toLowerCase() === 'ya' || getVal(c, 'YATIM PIATU').toLowerCase().includes('piatu');
                    const isChildDsb = String(getVal(c, 'DISABILITAS')).toLowerCase() === 'ya' || getVal(c, 'DISABILITAS').toLowerCase().includes('disabilitas');

                    if(isYT) map[w].yt++;
                    if(isYP) map[w].yp++;
                    if(isChildDsb) map[w].dsb++;
                });

                if (regionAnalysisFilter) {
                    Object.keys(activeKkSet).forEach(w => {
                        map[w].kk = activeKkSet[w].size; 
                        activeKkSet[w].forEach(fid => {
                            const f = familyLookupMap[fid];
                            if (f && String(getVal(f, 'KATAGORI ISTRI')).toLowerCase().includes('disabilitas')) map[w].dsb++;
                        });
                    });
                } else {
                    data.keluarga.forEach(f => {
                        const w = (getVal(f, 'WILAYAH') || 'Lainnya').trim().toUpperCase();
                        if (String(getVal(f, 'KATAGORI ISTRI')).toLowerCase().includes('disabilitas')) {
                            if (map[w]) map[w].dsb++;
                        }
                    });
                }
                
                return Object.entries(map)
                    .map(([wilayah, d]) => ({ wilayah, ...d }))
                    .filter(w => !(w.wilayah.toUpperCase() === 'LAINNYA' && w.yt === 0 && w.yp === 0 && w.dsb === 0))
                    .sort((a, b) => b.kk - a.kk);
            }, [data, regionAnalysisFilter, familyLookupMap]);

            const filteredKeluarga = useMemo(() => {
                let result = data.keluarga;
                if (role === 'korwil') {
                    result = result.filter(f => allowedRegions.includes((getVal(f, 'WILAYAH') || '').toUpperCase()));
                } else if (filterWilayah) {
                    result = result.filter(f => (getVal(f, 'WILAYAH') || '').toUpperCase() === filterWilayah.toUpperCase());
                }
                
                if (filterProgram) {
                    result = result.filter(f => {
                        const anakKeluarga = data.anak.filter(c => norm(getVal(c, 'ID_Keluarga')) === norm(getVal(f, 'ID_Keluarga')));
                        return anakKeluarga.some(c => {
                            const p = (getVal(c, 'PROGRAM') || '').toLowerCase();
                            if (filterProgram === 'Gopay') return p.includes('gopay');
                            if (filterProgram === 'SAPA') return p.includes('sapa') || p.includes('asuh') || p.includes('ota');
                            return true;
                        });
                    });
                }

                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    result = result.filter(f => {
                        const matchKeluarga = (getVal(f, 'NAMA ALM') || '').toLowerCase().includes(q) || (getVal(f, 'NAMA IBU') || '').toLowerCase().includes(q);
                        const anakKeluarga = data.anak.filter(c => norm(getVal(c, 'ID_Keluarga')) === norm(getVal(f, 'ID_Keluarga')));
                        const matchAnak = anakKeluarga.some(c => (getVal(c, 'NAMA ANAK') || '').toLowerCase().includes(q));
                        return matchKeluarga || matchAnak;
                    });
                }
                return result;
            }, [data.keluarga, data.anak, searchQuery, filterWilayah, filterProgram, role, allowedRegions]);

            // UPDATE: MEMASUKAN LOGIKA FILTER MULTI-SELECT KELAS, JENJANG SEKOLAH, & OTA
            const filteredAnak = useMemo(() => {
                let result = data.anak;
                
                if (role === 'korwil') {
                    result = result.filter(c => {
                        const parent = familyLookupMap[norm(getVal(c, 'ID_Keluarga'))];
                        const w = parent ? (getVal(parent, 'WILAYAH') || '').toUpperCase() : '';
                        return allowedRegions.includes(w);
                    });
                } else if (filterWilayah) {
                    result = result.filter(c => {
                        const parent = familyLookupMap[norm(getVal(c, 'ID_Keluarga'))];
                        const w = parent ? (getVal(parent, 'WILAYAH') || 'LAINNYA').trim().toUpperCase() : 'LAINNYA';
                        return w === filterWilayah.toUpperCase();
                    });
                }
                
                if (filterProgram) {
                    result = result.filter(c => {
                        const p = (getVal(c, 'PROGRAM') || '').toLowerCase();
                        if (filterProgram === 'Gopay') return p.includes('gopay');
                        if (filterProgram === 'SAPA') return p.includes('sapa') || p.includes('asuh') || p.includes('ota');
                        return true;
                    });

                    // ✅ LOGIKA BARU: Terapkan Filter OTA jika program SAPA terpilih
                    if (filterProgram === 'SAPA' && filterOta) {
                        result = result.filter(c => (getVal(c, 'NAMA ORANG TUA ASUH') || '').toUpperCase() === filterOta.toUpperCase());
                    }
                }

                if (filterKategoriAnak) {
                    result = result.filter(c => {
                        const valYT = (getVal(c, 'YATIM') || "").toUpperCase();
                        const valYP = (getVal(c, 'YATIM PIATU') || "").toUpperCase();
                        const valDSB = (getVal(c, 'DISABILITAS') || "").toUpperCase();
                        
                        if (filterKategoriAnak === 'Yatim') return valYT.includes('YATIM') || valYT === 'YA';
                        if (filterKategoriAnak === 'Yatim Piatu') return valYP.includes('PIATU') || valYP === 'YA';
                        if (filterKategoriAnak === 'Disabilitas') return valDSB.includes('DISABILITAS') || valDSB === 'YA';
                        return true;
                    });
                }

                if (filterKelas && filterKelas.length > 0) {
                    result = result.filter(c => {
                        const k = (getVal(c, 'KELAS') || '').toString().trim().toUpperCase();
                        return filterKelas.some(fk => k === fk.toUpperCase());
                    });
                }

                if (filterJenjang && filterJenjang.length > 0) {
                    result = result.filter(c => {
                        const j = (getVal(c, 'JENJANG SEKOLAH') || '').toString().trim().toUpperCase();
                        return filterJenjang.some(fj => j === fj.toUpperCase());
                    });
                }

                if (searchQuery) result = result.filter(c => (getVal(c, 'NAMA ANAK') || '').toLowerCase().includes(searchQuery.toLowerCase()));
                return result;
            }, [data.anak, familyLookupMap, searchQuery, filterProgram, filterWilayah, filterKategoriAnak, filterKelas, filterJenjang, filterOta, role, allowedRegions]);

            const openEditFamily = (f) => {
                setRegFamily(f);
                const relatedChildren = data.anak.filter(c => norm(getVal(c, 'ID_Keluarga')) === norm(getVal(f, 'ID_Keluarga')));
                setRegChildren(relatedChildren.length > 0 ? relatedChildren : []);
                setRegModal({ open: true, step: 1, mode: 'edit' }); setErrorMsg('');
            };

            const openEditChild = (c) => {
                const parent = familyLookupMap[norm(getVal(c, 'ID_Keluarga'))];
                if (parent) setRegFamily(parent);
                setRegChildren([c]); setRegModal({ open: true, step: 2, mode: 'edit' }); setErrorMsg('');
            };

            const togglePrintSelection = (id) => {
                setSelectedForPrint(prev => prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]);
            };

            // ============================================================
            // ✅ FUNGSI BARU UNTUK MEMPERBAIKI TOMBOL SELANJUTNYA & SIMPAN
            // ============================================================
            const validateStep1 = () => {
                if (!regFamily['NAMA ALM'] && !regFamily['NAMA IBU']) {
                    return "Minimal Nama Alm atau Nama Ibu harus diisi!";
                }
                if (!regFamily['WILAYAH']) {
                    return "Wilayah wajib dipilih!";
                }
                return null;
            };

            const handleUnifiedSubmit = async () => {
                setLoading("MENYIMPAN DATA...");
                try {
                    const token = yassaStore.get('yassa-token') || '';
                    
                    // 1. Persiapkan ID Keluarga
                    let familyData = { ...regFamily };
                    if (regModal.mode === 'add') {
                        const alm = (familyData['NAMA ALM'] || 'X').trim().toUpperCase();
                        const ibu = (familyData['NAMA IBU'] || 'X').trim().toUpperCase();
                        familyData['ID_Keluarga'] = `${alm} ${ibu}`;
                    }

                    // 2. Simpan Data Keluarga
                    const payloadKeluarga = {
                        action: regModal.mode === 'add' ? 'create' : 'update',
                        sheet: 'Keluarga',
                        id: regModal.mode === 'edit' ? familyData['ID_Keluarga'] : undefined,
                        data: familyData,
                        token: token
                    };
                    const resKeluarga = await postApi(payloadKeluarga);
                    if (!resKeluarga.success) throw new Error(resKeluarga.error);

                    // 3. Simpan Data Anak
                    const almForChild = (familyData['NAMA ALM'] || 'X').trim().toUpperCase();
                    
                    for (let i = 0; i < regChildren.length; i++) {
                        let childData = { ...regChildren[i] };
                        childData['ID_Keluarga'] = familyData['ID_Keluarga'];
                        
                        // FIX: Deteksi apakah ini anak yang sudah ada sebelumnya di database
                        const isExistingChild = !!childData['ID_Anak'];
                        
                        // Format ID_Anak diambil dari Nama Anak + Nama Alm
                        if (regModal.mode === 'add' || !isExistingChild) {
                            const namaAnak = (childData['NAMA ANAK'] || `ANAK ${i+1}`).trim().toUpperCase();
                            childData['ID_Anak'] = `${namaAnak} ${almForChild}`;
                        }

                        const payloadAnak = {
                            // FIX: Gunakan isExistingChild penentu action agar anak baru di mode Edit tetap memicu 'create'
                            action: isExistingChild && regModal.mode === 'edit' ? 'update' : 'create',
                            sheet: 'Anak',
                            id: childData['ID_Anak'],
                            data: childData,
                            token: token
                        };
                        await postApi(payloadAnak);
                    }
                    
                    setMsg("✅ Data berhasil disimpan!");

                    // 🆕 CATAT KE RIWAYAT AKTIVITAS SETIAP KALI SIMPAN/EDIT
                    if (regModal.mode === 'add') {
                        sendLog(activeUser, role, userWilayah, `Tambah Data KK Baru: ${familyData['NAMA ALM'] || familyData['NAMA IBU']}`);
                    } else {
                        sendLog(activeUser, role, userWilayah, `Merubah Data (Rekening/No HP dll): KK ${familyData['NAMA ALM'] || familyData['NAMA IBU']}`);
                    }

                    setRegModal({ open: false, step: 1, mode: 'add' });
                    refresh(); 
                } catch (error) {
                    setErrorMsg("❌ Terjadi kesalahan: " + error.message);
                }
                setLoading(false);
                setTimeout(() => setMsg(""), 4000);
            };

            // ============================================================
            // 🆕 TAMPILAN SPLASH SCREEN AWAL (REACT)
            // ============================================================
            if (isSplashVisible) {
                return (
                    <div className="fixed inset-0 bg-[#0B0F19] flex flex-col items-center justify-center z-[9999] fade-in">

                                YASSA<span className="text-[#16a34a]">Mobile</span>
                            </h1>
                            <span className="text-3xl animate-pulse drop-shadow-lg">✨</span>
                        </div>
                        
                        <div className="w-48 sm:w-56 h-1.5 bg-slate-800 rounded-full overflow-hidden mb-6 relative">
                            {/* Menggunakan animasi CSS kustom dari tag <style> */}
                            <div className="absolute top-0 left-0 h-full w-1/2 bg-gradient-to-r from-emerald-400 via-green-500 to-emerald-600 rounded-full anim-loading-bar shadow-[0_0_10px_rgba(34,197,94,0.5)]"></div>
                        </div>
                        
                        <p className="text-slate-400 text-[11px] font-medium tracking-wide animate-pulse">Memuat data...</p>
                    </div>
                );
            }

            // TAMPILAN LOGIN (FULL MATCH STITCH - TERINTEGRASI WA ADMIN)
            if (!role) {
                return (
                    <div className="fixed inset-0 overflow-y-auto overscroll-none z-50 text-[#1b1c1c] antialiased flex flex-col relative" style={{ backgroundColor: '#f0f0f0', fontFamily: "'Plus Jakarta Sans', 'Hanken Grotesk', sans-serif" }}>
                        
                        {/* Header (TopAppBar) */}
                        <header className="fixed w-full top-0 left-0 z-50 bg-[#f0f0f0]/80 backdrop-blur-md">

                                <button className="text-[#4caf50] w-8 h-8 flex items-center justify-center rounded-full bg-white shadow-sm border border-white/50 hover:scale-105 active:scale-95 transition-all">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                                </button>
                                <h1 className="font-extrabold text-[16px] absolute left-1/2 transform -translate-x-1/2 text-slate-800 tracking-wide">YASSA</h1>
                                <div className="w-8 h-8"></div>
                            </div>
                        </header>

                        {/* Pembungkus Main diubah agar bisa di-scroll jika layar terlalu pendek */}
                        <main className="flex-1 flex flex-col items-center px-5 pt-20 pb-24 max-w-md mx-auto w-full min-h-screen">
                            <div className="w-full my-auto flex flex-col items-center">
                            
                            {/* Logo - Dipaksa rata tengah dengan jarak seimbang */}
                            <div className="mt-0 mb-3 w-full flex justify-center relative">
                                <div className="w-[110px] h-[110px] bg-white rounded-full flex items-center justify-center p-2 border border-white/60 mx-auto" style={{ boxShadow: '6px 6px 12px #d1d1d1, -6px -6px 12px #ffffff' }}>
                                    <YassaLogo size={90} mode="mini" />
                                </div>
                            </div>

                            {/* Teks Sambutan */}
                            <div className="text-center mb-5 w-full flex flex-col items-center">
                                <h2 className="text-[22px] font-extrabold mb-0.5 text-slate-800 tracking-tight text-center">Selamat Datang</h2>
                                <p className="text-[11px] text-slate-500 font-bold text-center">Silakan masuk ke akun Anda</p>
                            </div>

                            <div className="w-full bg-[#ffffff] p-5 rounded-[1.5rem]" style={{ boxShadow: '10px 10px 20px #d1d1d1, -10px -10px 20px #ffffff' }}>
                                
                                {loginError && (
                                    <div className="mb-3 text-rose-600 bg-rose-50 p-2.5 rounded-xl text-[10px] font-bold text-center uppercase tracking-widest border border-rose-100">
                                        {loginError}

                                <div className="flex flex-col gap-4">

                                            <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>

                                                placeholder="628..."

                                            </div>
                                            <input

    <!-- PWA Service Worker + Auto-Update -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => {
                        console.log('✅ SW YASSA terdaftar:', reg.scope);

                        // Deteksi SW baru tersedia
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            console.log('[SW] Update ditemukan, menginstall...');

                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        // Ada versi baru → kirim perintah skip waiting
                                        console.log('[SW] Versi baru siap, aktivasi...');
                                        newWorker.postMessage('SKIP_WAITING');
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.error('❌ SW gagal:', err));

                // Reload otomatis saat SW baru mengambil alih
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        console.log('[SW] Controller baru aktif, reload...');
                        window.location.reload();
                    }
                });
            });
        }
